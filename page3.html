<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot Blitz | Debugged</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #4ade80; --fail: #f87171; --text: #f8fafc; --secondary: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        #game-header { width: 100%; padding: 10px; background: var(--card); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 600px; margin: 0 auto; text-align: center; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 8px; font-weight: bold; }
        #timer-bar { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        #game-area { width: 95%; max-width: 500px; padding: 20px 10px; }
        .grid { display: grid; gap: 8px; margin: 0 auto; }
        .grid-5x5 { grid-template-columns: repeat(5, 1fr); }
        .grid-8x5 { grid-template-columns: repeat(5, 1fr); } /* Still 5 wide, just taller */

        .cell {
            aspect-ratio: 1; background: #334155; border: 1px solid #475569; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s; color: var(--text); user-select: none;
        }
        .cell.target { background: var(--accent) !important; color: var(--bg) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .cell.hide-text { color: transparent !important; }
        .cell.correct { background: var(--success) !important; color: var(--bg) !important; }
        .cell.wrong { background: var(--fail) !important; }

        .screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 200; text-align: center; }
        .profile-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 360px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; text-align: center; }
        button { padding: 14px 28px; border: none; border-radius: 10px; background: var(--accent); color: var(--bg); font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-delete { background: none; color: var(--fail); width: auto; font-size: 1.5rem; cursor: pointer; border:none; }
        .hidden { display: none !important; }
        #msg { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-top: 15px; text-align: center;}
    </style>
</head>
<body>

    <div id="game-header" class="hidden">
        <div class="header-content">
            <h3 style="margin:0;">SNAPSHOT BLITZ</h3>
            <div class="stats-row">
                <span>LVL: <span id="cur-lvl">1</span></span>
                <span>TIME: <span id="cur-time">5.0</span>s</span>
                <span>SCORE: <span id="cur-score">0</span></span>
            </div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>SNAPSHOT BLITZ</h1>
        <div class="profile-card">
            <div id="profile-setup">
                <input type="text" id="nick-input" placeholder="Nickname" maxlength="12">
                <input type="text" id="icon-input" placeholder="Icon (⚡, 🔥)" maxlength="2">
                <button onclick="saveProfile()">CREATE PROFILE</button>
            </div>
            <div id="profile-display" class="hidden">
                <div style="display: flex; justify-content: space-between;">
                    <div id="display-icon" style="font-size: 3rem;"></div>
                    <button class="btn-delete" onclick="deleteProfile()">🗑️</button>
                </div>
                <h2 id="display-name" style="text-align: left;"></h2>
                <p style="text-align: left;">PB: <span id="top-score">0</span></p>
                <button onclick="initGame()" style="background: var(--success);">PLAY</button>
            </div>
        </div>
    </div>

    <div id="gate-screen" class="screen hidden">
        <h1 style="color: var(--success);">LEVEL CLEAR!</h1>
        <p id="gate-desc"></p>
        <button onclick="startNextRound()">CONTINUE</button>
    </div>

    <div id="fail-screen" class="screen hidden">
        <h1 style="color: var(--fail);">FAILED</h1>
        <p id="fail-stats"></p>
        <button onclick="initGame()">RESTART</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid grid-5x5"></div>
        <div id="msg">READY?</div>
    </div>

    <script>
        let user = { name: "Recruit", icon: "⭐", topScore: 0 };
        let state = { score: 0, level: 1, targets: [], found: 0, totalCells: 25, targetCount: 5, status: 'idle' };
        let gameTimer;

        function loadProfile() {
            const data = localStorage.getItem('blitz_v2');
            if (data) {
                user = JSON.parse(data);
                document.getElementById('display-name').textContent = user.name;
                document.getElementById('display-icon').textContent = user.icon;
                document.getElementById('top-score').textContent = user.topScore;
                document.getElementById('profile-setup').classList.add('hidden');
                document.getElementById('profile-display').classList.remove('hidden');
            }
        }

        function saveProfile() {
            const n = document.getElementById('nick-input').value.trim();
            const i = document.getElementById('icon-input').value.trim();
            if (!n) return;
            user = { name: n, icon: i || "👤", topScore: 0 };
            localStorage.setItem('blitz_v2', JSON.stringify(user));
            loadProfile();
        }

        function deleteProfile() {
            if(confirm("Delete?")) { localStorage.removeItem('blitz_v2'); location.reload(); }
        }

        function initGame() {
            state.score = 0;
            state.level = 1;
            state.targetCount = 5;
            state.totalCells = 25;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            startNextRound();
        }

        function startNextRound() {
            clearInterval(gameTimer);
            state.found = 0; // CRITICAL RESET
            state.status = 'memorize';
            document.getElementById('gate-screen').classList.add('hidden');
            
            // Scaling Difficulty
            if (state.level === 11) state.targetCount = 8;
            if (state.level === 21) state.targetCount = 12;
            if (state.level === 31) { state.targetCount = 15; state.totalCells = 40; }

            renderGrid();
            document.getElementById('cur-lvl').textContent = state.level;
            document.getElementById('cur-score').textContent = state.score;
            document.getElementById('msg').textContent = "MEMORIZE...";
            document.getElementById('timer-fill').style.width = "100%";

            setTimeout(() => {
                state.status = 'play';
                document.querySelectorAll('.cell').forEach(c => c.classList.add('hide-text'));
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('target'));
                runTimer();
            }, 2000);
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            container.className = state.totalCells === 40 ? 'grid grid-8x5' : 'grid grid-5x5';
            const pool = Array.from({length: state.totalCells}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = pool.slice(0, state.targetCount);

            for (let i = 1; i <= state.totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = i;
                if (state.targets.includes(i)) cell.classList.add('target');
                cell.onclick = () => handleTap(cell, i);
                container.appendChild(cell);
            }
        }

        function runTimer() {
            document.getElementById('msg').textContent = "GO!";
            let timeLeft = 5.0;
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('cur-time').textContent = Math.max(0, timeLeft).toFixed(1);
                document.getElementById('timer-fill').style.width = (timeLeft/5 * 100) + "%";
                if (timeLeft <= 0) endGame("TIME OUT");
            }, 100);
        }

        function handleTap(el, val) {
            if (state.status !== 'play' || el.classList.contains('correct')) return;

            if (state.targets.includes(val)) {
                el.classList.remove('hide-text');
                el.classList.add('correct');
                state.found++;
                state.score += (10 * state.level);
                document.getElementById('cur-score').textContent = state.score;
                if (state.found === state.targetCount) winRound();
            } else {
                el.classList.add('wrong');
                endGame("WRONG CELL");
            }
        }

        function winRound() {
            clearInterval(gameTimer);
            state.status = 'idle';
            state.level++;
            if ([11, 21, 31].includes(state.level)) {
                document.getElementById('gate-screen').classList.remove('hidden');
                document.getElementById('gate-desc').textContent = `Tier Jump! Targets now: ${state.level === 11 ? 8 : state.level === 21 ? 12 : 15}`;
            } else {
                setTimeout(startNextRound, 600);
            }
        }

        function endGame(reason) {
            clearInterval(gameTimer);
            state.status = 'idle';
            if (state.score > user.topScore) {
                user.topScore = state.score;
                localStorage.setItem('blitz_v2', JSON.stringify(user));
            }
            document.getElementById('fail-screen').classList.remove('hidden');
            document.getElementById('fail-stats').textContent = `${reason} | Score: ${state.score}`;
        }

        loadProfile();
    </script>
</body>
</html>
