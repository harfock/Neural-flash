<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot Blitz | Professional</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #4ade80;
            --fail: #f87171;
            --text: #f8fafc;
            --secondary: #64748b;
            --gold: #fef08a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; transition: all 0.2s ease; }
        
        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Nav */
        .top-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px; z-index: 300; }
        .btn-icon { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; }

        /* Game Header */
        #game-header { width: 100%; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-weight: 800; }
        #timer-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); }

        /* Grid Logic */
        #game-area { width: 95%; max-width: 420px; padding: 10px 0; }
        .grid { display: grid; gap: 8px; margin: 0 auto; }
        .grid-5x5 { grid-template-columns: repeat(5, 1fr); }
        .grid-8x5 { grid-template-columns: repeat(5, 1fr); }

        .cell {
            aspect-ratio: 1;
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; cursor: pointer; color: var(--text); user-select: none;
        }
        .cell.target { background: var(--accent) !important; color: var(--bg) !important; transform: scale(1.05); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }
        .cell.hide-text { color: transparent !important; }
        .cell.correct { background: var(--success) !important; color: var(--bg) !important; transform: scale(0.95); }
        .cell.wrong { background: var(--fail) !important; animation: shake 0.3s; }
        .cell.hint-flash { animation: flashHint 0.5s infinite; }
        @keyframes flashHint { 0%, 100% { background: rgba(51, 65, 85, 0.6); } 50% { background: var(--gold); } }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

        /* Overlays */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 200; background: var(--bg); }
        .container { width: 100%; max-width: 400px; padding: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; text-align: center; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: var(--bg); font-weight: bold; cursor: pointer; margin-top: 8px; }

        .profile-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .profile-item:hover { background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent); }

        .elderly-badge { background: var(--gold); color: #854d0e; padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-icon" onclick="toggleLang()">🌐 EN / 繁中</button>
        <button id="btn-logout" class="btn-icon hidden" onclick="location.reload()">👤 Switch User</button>
    </div>

    <div id="game-header" class="hidden">
        <div class="header-content glass-panel" style="padding: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span id="user-tag" style="font-weight: bold; color: var(--accent); font-size: 0.9rem;"></span>
                <div id="eld-btn" class="elderly-badge" onclick="toggleElderly()">👴 <span id="txt-eld-btn">Elderly Mode</span></div>
            </div>
            <div class="stats-grid">
                <div><small id="txt-lvl">LVL</small><br><span id="cur-lvl">1</span></div>
                <div id="timer-ui"><small id="txt-time">TIME</small><br><span id="cur-time">5.0</span>s</div>
                <div><small id="txt-score">SCORE</small><br><span id="cur-score">0</span></div>
            </div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h2 style="letter-spacing: 3px; margin-bottom: 15px;">SNAPSHOT <span style="color: var(--accent);">BLITZ</span></h2>
        
        <div class="container glass-panel">
            <div id="profile-select-view">
                <h4 id="txt-select-head" style="margin-top:0;">Select Profile</h4>
                <div id="profile-list" style="margin: 15px 0;"></div>
                <button class="btn-primary" onclick="showCreateView()" id="txt-new-btn">+ New Profile</button>
            </div>

            <div id="profile-create-view" class="hidden">
                <input type="text" id="in-name" placeholder="Name">
                <input type="text" id="in-icon" placeholder="Icon (⚡)">
                <button class="btn-primary" onclick="createProfile()" id="txt-create-btn">CREATE</button>
                <button class="btn-icon" onclick="showSelectView()" style="width:100%; margin-top:8px;">Back</button>
            </div>

            <div id="profile-dash-view" class="hidden">
                <h3 id="dash-name" style="margin-top:0;"></h3>
                <button class="btn-primary" onclick="startAt(state.level)" id="txt-resume-btn">RESUME</button>
                <button class="btn-primary" style="background: var(--success);" onclick="startAt(1)" id="txt-start-btn">START LVL 1</button>
                <button class="btn-icon" style="color: var(--fail); width: 100%; margin-top: 12px;" onclick="delProfile()">Delete Profile</button>
            </div>

            <div id="rule-guide" style="margin-top: 20px; font-size: 0.8rem; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <strong id="txt-rule-head">HOW TO PLAY:</strong>
                <p id="txt-rule-flash" style="margin: 5px 0; color: var(--accent);"></p>
                <p id="txt-rule-click" style="margin: 5px 0; color: var(--success);"></p>
                <div id="tier-list" style="color: var(--secondary); margin-top: 8px;"></div>
                <p id="txt-eld-info" style="color: var(--gold); font-size: 0.7rem; margin-top: 10px; font-style: italic;"></p>
            </div>
        </div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <div class="container glass-panel" style="text-align: center;">
            <h2 id="txt-fail-head" style="color: var(--fail);">FAILED</h2>
            <p id="fail-desc"></p>
            <button class="btn-primary" onclick="runRound()">RETRY</button>
            <button class="btn-icon" style="width:100%; margin-top:8px;" onclick="location.reload()">QUIT</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid"></div>
        <div id="msg" style="text-align: center; margin-top: 15px; font-weight: bold; color: var(--accent);"></div>
    </div>

    <script>
        const i18n = {
            en: {
                select: "Select Profile", new: "+ New Profile", create: "CREATE PROFILE", 
                resume: "RESUME MISSION", start: "START LVL 1", lvl: "LVL", time: "TIME",
                score: "SCORE", eldBtn: "Elderly Mode", fail: "FAILED", 
                ruleHead: "GAME RULES:",
                ruleFlash: "⚡ 5 numbers FLASH for 2 seconds.",
                ruleClick: "🎯 CLICK all correct tiles within 5 seconds.",
                tiers: ["Tier 1: 5 Targets", "Tier 2: 8 Targets (Lvl 11+)", "Tier 3: 12 Targets (Lvl 21+)", "Tier 4: 15 Targets (Lvl 31+)"],
                eldInfo: "Elderly Mode: No 5s limit. Hints flash after 30s.",
                mem: "MEMORIZE...", go: "GO!", clear: "CLEAR!"
            },
            big5: {
                select: "選擇使用者", new: "+ 建立新檔案", create: "建立個人檔案", 
                resume: "繼續挑戰", start: "從第一關開始", lvl: "等級", time: "時間",
                score: "分數", eldBtn: "長者模式", fail: "挑戰失敗",
                ruleHead: "遊戲規則：",
                ruleFlash: "⚡ 5個數字會閃爍顯示 2秒。",
                ruleClick: "🎯 您必須在 5秒內點選正確方格。",
                tiers: ["第一段: 5個目標", "第二段: 8個目標 (11級+)", "第三段: 12個目標 (21級+)", "第四段: 15個目標 (31級+)"],
                eldInfo: "長者模式：取消5秒限制。若30秒無動作將閃爍提示。",
                mem: "記憶中...", go: "開始！", clear: "過關！"
            }
        };

        let lang = 'en';
        let profiles = [];
        let curIdx = -1;
        let state = { level: 1, score: 0, targets: [], found: 0, status: 'idle', idleSec: 0 };
        let gameTimer, hintTimer;

        function toggleLang() {
            lang = lang === 'en' ? 'big5' : 'en';
            renderUI();
        }

        function renderUI() {
            const t = i18n[lang];
            document.getElementById('txt-select-head').innerText = t.select;
            document.getElementById('txt-new-btn').innerText = t.new;
            document.getElementById('txt-create-btn').innerText = t.create;
            document.getElementById('txt-resume-btn').innerText = t.resume;
            document.getElementById('txt-start-btn').innerText = t.start;
            document.getElementById('txt-lvl').innerText = t.lvl;
            document.getElementById('txt-time').innerText = t.time;
            document.getElementById('txt-score').innerText = t.score;
            document.getElementById('txt-eld-btn').innerText = t.eldBtn;
            document.getElementById('txt-rule-head').innerText = t.ruleHead;
            document.getElementById('txt-rule-flash').innerText = t.ruleFlash;
            document.getElementById('txt-rule-click').innerText = t.ruleClick;
            document.getElementById('txt-eld-info').innerText = t.eldInfo;
            document.getElementById('txt-fail-head').innerText = t.fail;
            document.getElementById('tier-list').innerHTML = t.tiers.map(r => `• ${r}`).join('<br>');
        }

        function loadProfiles() {
            const saved = localStorage.getItem('blitz_final_v1');
            profiles = saved ? JSON.parse(saved) : [];
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            profiles.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'profile-item';
                d.innerHTML = `<div><strong>${p.icon} ${p.name}</strong><br><small>Lvl ${p.maxLvl}</small></div><span>▶</span>`;
                d.onclick = () => selectProfile(i);
                list.appendChild(d);
            });
            renderUI();
        }

        function selectProfile(i) {
            curIdx = i;
            state.level = profiles[i].maxLvl;
            document.getElementById('dash-name').innerText = `${profiles[i].icon} ${profiles[i].name}`;
            document.getElementById('user-tag').innerText = `${profiles[i].icon} ${profiles[i].name}`;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-dash-view').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            updateEldUI();
        }

        function showCreateView() { document.getElementById('profile-select-view').classList.add('hidden'); document.getElementById('profile-create-view').classList.remove('hidden'); }
        function showSelectView() { document.getElementById('profile-create-view').classList.add('hidden'); document.getElementById('profile-select-view').classList.remove('hidden'); }
        function createProfile() {
            const n = document.getElementById('in-name').value.trim();
            const i = document.getElementById('in-icon').value.trim() || "👤";
            if(!n) return;
            profiles.push({ name: n, icon: i, maxLvl: 1, topScore: 0, elderly: false });
            localStorage.setItem('blitz_final_v1', JSON.stringify(profiles));
            location.reload();
        }
        function delProfile() { if(confirm("Delete Profile?")) { profiles.splice(curIdx, 1); localStorage.setItem('blitz_final_v1', JSON.stringify(profiles)); location.reload(); } }

        function toggleElderly() {
            profiles[curIdx].elderly = !profiles[curIdx].elderly;
            localStorage.setItem('blitz_final_v1', JSON.stringify(profiles));
            updateEldUI();
            if(profiles[curIdx].elderly) clearInterval(gameTimer);
            else if(state.status === 'play') startBlitzTimer();
        }

        function updateEldUI() {
            const eld = profiles[curIdx].elderly;
            document.getElementById('eld-btn').style.opacity = eld ? "1" : "0.4";
            document.getElementById('timer-bar').style.display = eld ? "none" : "block";
            document.getElementById('timer-ui').style.opacity = eld ? "0" : "1";
        }

        function startAt(lvl) {
            state.level = lvl; state.score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            runRound();
        }

        function runRound() {
            clearInterval(gameTimer); clearInterval(hintTimer);
            state.found = 0; state.status = 'mem'; state.idleSec = 0;
            document.getElementById('fail-screen').classList.add('hidden');
            
            let tCount = state.level >= 31 ? 15 : state.level >= 21 ? 12 : state.level >= 11 ? 8 : 5;
            let cells = state.level >= 31 ? 40 : 25;

            initGrid(cells, tCount);
            document.getElementById('msg').innerText = i18n[lang].mem;
            document.getElementById('cur-lvl').innerText = state.level;

            setTimeout(() => {
                state.status = 'play';
                document.querySelectorAll('.cell').forEach(c => { c.classList.add('hide-text'); c.classList.remove('target'); });
                document.getElementById('msg').innerText = i18n[lang].go;
                if(!profiles[curIdx].elderly) startBlitzTimer();
                startHintWatcher();
            }, 2000);
        }

        function initGrid(count, tCount) {
            const g = document.getElementById('grid-container');
            g.innerHTML = '';
            g.className = count === 40 ? 'grid grid-8x5' : 'grid grid-5x5';
            const p = Array.from({length: count}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = p.slice(0, tCount);
            for(let i=1; i<=count; i++) {
                const c = document.createElement('div');
                c.className = 'cell'; c.innerText = i;
                if(state.targets.includes(i)) c.classList.add('target');
                c.onclick = () => onCellTap(c, i);
                g.appendChild(c);
            }
        }

        function onCellTap(el, v) {
            if(state.status !== 'play' || el.classList.contains('correct')) return;
            state.idleSec = 0;
            if(state.targets.includes(v)) {
                el.classList.remove('hide-text', 'hint-flash');
                el.classList.add('correct');
                state.found++;
                state.score += 10;
                document.getElementById('cur-score').innerText = state.score;
                if(state.found === state.targets.length) levelUp();
            } else {
                el.classList.add('wrong');
                fail();
            }
        }

        function startBlitzTimer() {
            let s = 5.0;
            gameTimer = setInterval(() => {
                s -= 0.1;
                document.getElementById('cur-time').innerText = Math.max(0, s).toFixed(1);
                document.getElementById('timer-fill').style.width = (s/5 * 100) + "%";
                if(s <= 0) fail();
            }, 100);
        }

        function startHintWatcher() {
            hintTimer = setInterval(() => {
                state.idleSec++;
                if(state.idleSec >= 30) {
                    const rem = Array.from(document.querySelectorAll('.cell')).filter(c => state.targets.includes(parseInt(c.innerText)) && !c.classList.contains('correct'));
                    if(rem.length) rem[Math.floor(Math.random()*rem.length)].classList.add('hint-flash');
                    state.idleSec = 0;
                }
            }, 1000);
        }

        function levelUp() {
            clearInterval(gameTimer); clearInterval(hintTimer);
            state.status = 'idle';
            state.level++;
            if(state.level > profiles[curIdx].maxLvl) { profiles[curIdx].maxLvl = state.level; localStorage.setItem('blitz_final_v1', JSON.stringify(profiles)); }
            document.getElementById('msg').innerText = i18n[lang].clear;
            setTimeout(runRound, 800);
        }

        function fail() {
            clearInterval(gameTimer); clearInterval(hintTimer);
            state.status = 'idle';
            if(!profiles[curIdx].elderly && state.level > 1) state.level--;
            document.getElementById('fail-screen').classList.remove('hidden');
        }

        loadProfiles();
    </script>
</body>
</html>
