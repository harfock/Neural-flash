<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snapshot Blitz | Professional Edition</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(30, 30, 30, 0.95);
            --accent: #00eaff;
            --success: #00ff41;
            --fail: #ff003c;
            --text: #ffffff;
            --gold: #ffff00;
            --base-font: 1.1rem;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; touch-action: manipulation; }
        body {
            background: radial-gradient(circle at top, #1a1a1a, #000000);
            color: var(--text); margin: 0; font-size: var(--base-font);
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* --- ONE-SCREEN GAME AREA --- */
        #game-area { 
            width: 90vw; 
            height: calc(100vh - 220px); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: auto;
        }

        .grid { 
            display: grid; gap: 1.5vmin; width: 100%; height: 100%;
            grid-auto-rows: 1fr; place-content: center;
        }

        .cell {
            aspect-ratio: 1; background: #111; border: 3px solid #444; 
            border-radius: 50%; /* Individual numbers are circles */
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 3.5vmin; cursor: pointer; color: var(--text);
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); margin: auto;
            width: 100%; max-width: 12vmin;
        }

        .cell.target { background: var(--accent) !important; color: #000 !important; border-color: #fff; }
        .cell.correct { background: var(--success) !important; color: #000 !important; border-color: #fff; }
        .cell.wrong { background: var(--fail) !important; border-color: #fff; }

        /* --- MAIN PAGE STYLE --- */
        .glass-card {
            background: var(--glass); border: 3px solid var(--text);
            border-radius: 24px; padding: 20px; width: 95vw; max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 234, 255, 0.2); margin-top: 5px;
        }

        .top-bar { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; background: #000; flex-shrink: 0; }
        .btn-hc { background: var(--text); color: var(--bg); border: none; padding: 8px 12px; font-weight: 900; border-radius: 8px; cursor: pointer; }
        .btn-primary { width: 100%; padding: 15px; background: var(--success); color: #000; font-weight: 900; font-size: 1.3rem; border: none; border-radius: 15px; margin-top: 10px; cursor: pointer; }
        
        #game-header { width: 100%; padding: 10px; border-bottom: 4px solid var(--accent); flex-shrink: 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-weight: 900; }
        #timer-bar { width: 100%; height: 10px; background: #333; margin-top: 8px; border-radius: 5px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); }

        .profile-item { background: #111; border: 2px solid var(--text); padding: 10px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .profile-info { flex-grow: 1; cursor: pointer; }
        .profile-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 8px 12px; font-size: 1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }

        #elderly-hint-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 12px 20px;
            border-radius: 50px; font-weight: 900; z-index: 500;
            text-align: center; border: 4px solid #000; display: none; width: 80%;
        }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: var(--bg); padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
        #msg { text-align: center; font-weight: 900; font-size: 1.8rem; color: var(--accent); height: 40px; margin-top: 10px; flex-shrink: 0; }
        #rules-box { margin-top: 15px; font-size: 0.85rem; color: #ccc; border-top: 1px solid #444; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="elderly-hint-box"></div>

    <div class="top-bar">
        <span style="color: var(--accent); font-weight: 900;">SNAPSHOT BLITZ</span>
        <button id="btn-logout" class="btn-hc hidden" onclick="location.reload()">👤 切換 / SWITCH</button>
    </div>

    <div id="game-header" class="hidden">
        <div style="text-align: center; margin-bottom: 5px;">
            <button id="eld-toggle" class="btn-hc" style="background:var(--gold);" onclick="toggleElderly()">長者模式: 關</button>
        </div>
        <div class="stats-grid">
            <div><span>等級</span><br><span id="cur-lvl">1</span></div>
            <div><span>時間</span><br><span id="cur-time">--</span>s</div>
            <div><span>分數</span><br><span id="cur-score">0</span></div>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="color: var(--accent); margin-bottom: 5px;">快照閃電戰</h1>
        <div class="glass-card">
            <button class="btn-hc" style="width:100%; margin-bottom:15px; background:var(--accent);" onclick="toggleLang()">🌐 切換語言 / Switch Language</button>
            
            <div id="profile-select-view">
                <div id="profile-list"></div>
                <button class="btn-primary" onclick="showCreateView()">+ 新建檔案 / NEW PROFILE</button>
            </div>

            <div id="profile-dash-view" class="hidden">
                <h2 id="dash-name" style="color: var(--accent); margin:0;"></h2>
                <button class="btn-primary" onclick="startAt(state.level)">繼續挑戰 / RESUME</button>
                <button class="btn-primary" style="background: var(--accent);" onclick="startAt(1)">從頭開始 / START OVER</button>
                <button class="btn-hc" style="width:100%; margin-top:10px;" onclick="location.reload()">返回 / BACK</button>
            </div>

            <div id="profile-create-view" class="hidden">
                <input type="text" id="in-name" placeholder="NAME" style="width:100%; padding:15px; border-radius:10px; margin-bottom:10px; background:#222; color:#fff; border:1px solid var(--accent);">
                <button class="btn-primary" onclick="saveProfile()">儲存 / SAVE</button>
                <button class="btn-hc" style="width:100%; margin-top:10px;" onclick="cancelCreate()">取消 / CANCEL</button>
            </div>

            <div id="rules-box">
                <strong style="color: var(--gold);">詳細規則 / DETAILED RULES:</strong>
                <ul id="rule-list" style="padding-left: 20px; margin-top: 8px;"></ul>
            </div>
        </div>
    </div>

    <div id="tier-screen" class="screen hidden">
        <div class="glass-card" style="border-color: var(--gold); text-align:center;">
            <h1>階段完成 TIER CLEAR!</h1>
            <div id="tier-report" style="margin: 20px 0;"></div>
            <button class="btn-primary" onclick="closeTierGate()">進入下一階段 PROCEED</button>
        </div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <div class="glass-card" style="border-color: var(--fail); text-align:center;">
            <h1 style="color: var(--fail);">失敗 FAILED</h1>
            <button class="btn-primary" onclick="runRound()">重試 RETRY</button>
            <button class="btn-hc" style="width:100%; margin-top:15px;" onclick="location.reload()">退出 QUIT</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid"></div>
        <div id="msg"></div>
    </div>

    <script>
        // Use the SAME key to keep historical records across updates
        const STORAGE_KEY = 'blitz_v_final';

        const i18n = {
            en: {
                rules: ["Memory: Locations flash briefly. Remember them!", "Play: Bubbles stay visible. Click only the targets.", "One-Screen: Layout auto-scales to fit one screen.", "Elderly Mode: No timer and provides hints.", "Record: Progress is saved locally in your browser."],
                eldHint: (x, y) => `Found ${x}, ${y} left!`,
                mem: (n) => `MEMORIZE... (${n}s)`,
                tierMsg: (lvl, targets, grids) => `Level ${lvl} Incoming!<br>Find ${targets} targets in ${grids} bubbles.`
            },
            big5: {
                rules: ["記憶：目標號碼會短暫閃爍，請記住位置。", "點擊：號碼全程顯示，請選出剛才閃爍的目標。", "佈局：自動縮放，確保一屏顯示所有內容。", "長者模式：取消時間限制並提供即時提示。", "紀錄：您的挑戰進度會自動儲存在瀏覽器中。"],
                eldHint: (x, y) => `已找到 ${x} 個，還剩 ${y} 個！`,
                mem: (n) => `記憶中... (${n}秒)`,
                tierMsg: (lvl, targets, grids) => `準備進入第 ${lvl} 關！<br>目標：在 ${grids} 個氣泡中找出 ${targets} 個。`
            }
        };

        let lang = 'big5';
        let profiles = [];
        let curIdx = -1;
        let editingIdx = -1;
        let isElderly = false;
        let state = { level: 1, targets: [], found: 0, status: 'idle' };
        let gameTimer;

        function toggleLang() { lang = (lang === 'en') ? 'big5' : 'en'; loadProfiles(); }

        function loadProfiles() {
            // Load from localStorage - this keeps historical data
            profiles = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            profiles.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'profile-item';
                item.innerHTML = `
                    <div class="profile-info" onclick="selectProfile(${i})">
                        <strong>${p.name}</strong> <small>(LVL ${p.maxLvl})</small>
                    </div>
                    <div class="profile-actions">
                        <button class="btn-sm" style="background:var(--accent)" onclick="editProfile(${i})">✎</button>
                        <button class="btn-sm" style="background:var(--fail);color:#fff" onclick="deleteProfile(${i})">✕</button>
                    </div>`;
                list.appendChild(item);
            });
            document.getElementById('rule-list').innerHTML = i18n[lang].rules.map(r => `<li>${r}</li>`).join('');
        }

        function selectProfile(i) {
            curIdx = i; state.level = profiles[i].maxLvl;
            document.getElementById('dash-name').innerText = profiles[i].name;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-dash-view').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
        }

        function editProfile(i) {
            editingIdx = i;
            document.getElementById('in-name').value = profiles[i].name;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-create-view').classList.remove('hidden');
        }

        function deleteProfile(i) {
            if(confirm(lang === 'en' ? "Delete profile?" : "確定刪除檔案？")) {
                profiles.splice(i,1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
                loadProfiles();
            }
        }

        function showCreateView() { editingIdx = -1; document.getElementById('in-name').value = ''; document.getElementById('profile-select-view').classList.add('hidden'); document.getElementById('profile-create-view').classList.remove('hidden'); }
        function cancelCreate() { document.getElementById('profile-create-view').classList.add('hidden'); document.getElementById('profile-select-view').classList.remove('hidden'); }
        
        function saveProfile() {
            const n = document.getElementById('in-name').value.trim(); if(!n) return;
            if(editingIdx > -1) profiles[editingIdx].name = n;
            else profiles.push({name: n, maxLvl: 1});
            localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
            location.reload();
        }

        function startAt(lvl) {
            state.level = lvl;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            runRound();
        }

        function runRound() {
            clearInterval(gameTimer);
            state.found = 0; state.status = 'mem'; updateHint();
            document.getElementById('fail-screen').classList.add('hidden');
            
            const tier = Math.floor((state.level - 1) / 10);
            const gridCells = Math.min(100, 25 + (tier * 15));
            const density = Math.min(0.40, 0.20 + (((state.level - 1) % 10) * 0.02));
            const tCount = Math.floor(gridCells * density);
            
            initGrid(gridCells, tCount);
            document.getElementById('cur-lvl').innerText = state.level;
            document.getElementById('cur-time').innerText = (3.0 + tCount * 0.4).toFixed(1);
            document.getElementById('timer-fill').style.width = "100%";

            let remaining = tCount;
            document.getElementById('msg').innerText = i18n[lang].mem(remaining);
            const memInterval = setInterval(() => {
                remaining--;
                if(remaining > 0) document.getElementById('msg').innerText = i18n[lang].mem(remaining);
                else { clearInterval(memInterval); startPlay(tCount); }
            }, 1000);
        }

        function initGrid(count, tCount) {
            const g = document.getElementById('grid-container'); g.innerHTML = '';
            const cols = Math.ceil(Math.sqrt(count));
            const rows = Math.ceil(count / cols);
            g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            g.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            const p = Array.from({length: count}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = p.slice(0, tCount);
            for(let i=1; i<=count; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.innerText = i;
                if(state.targets.includes(i)) c.classList.add('target');
                c.onclick = () => {
                    if(state.status !== 'play' || c.classList.contains('correct')) return;
                    if(state.targets.includes(i)) {
                        c.classList.add('correct'); state.found++; updateHint();
                        if(state.found === state.targets.length) win();
                    } else { c.classList.add('wrong'); if(!isElderly) fail(); }
                };
                g.appendChild(c);
            }
        }

        function startPlay(tCount) {
            state.status = 'play'; updateHint();
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('target'));
            document.getElementById('msg').innerText = "GO!";
            if(!isElderly) {
                const total = 3.0 + tCount * 0.4; let s = total;
                gameTimer = setInterval(() => {
                    s -= 0.1;
                    document.getElementById('cur-time').innerText = Math.max(0, s).toFixed(1);
                    document.getElementById('timer-fill').style.width = (s/total*100) + "%";
                    if(s <= 0) fail();
                }, 100);
            }
        }

        function win() {
            clearInterval(gameTimer); state.status = 'idle'; updateHint();
            document.getElementById('msg').innerText = "CLEAR!";
            if(state.level % 10 === 0) {
                const nextLvl = state.level + 1;
                const nextGrids = Math.min(100, 25 + (Math.floor(nextLvl/10) * 15));
                const nextTargets = Math.floor(nextGrids * 0.20);
                document.getElementById('tier-report').innerHTML = i18n[lang].tierMsg(nextLvl, nextTargets, nextGrids);
                document.getElementById('tier-screen').classList.remove('hidden');
            } else { state.level++; save(); setTimeout(runRound, 1000); }
        }

        function closeTierGate() { state.level++; save(); document.getElementById('tier-screen').classList.add('hidden'); runRound(); }
        function fail() { clearInterval(gameTimer); state.status = 'idle'; updateHint(); document.getElementById('fail-screen').classList.remove('hidden'); }
        
        function save() { 
            if(curIdx > -1 && state.level > profiles[curIdx].maxLvl) { 
                profiles[curIdx].maxLvl = state.level; 
                localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); 
            } 
        }

        function toggleElderly() { isElderly = !isElderly; updateHint(); document.getElementById('timer-bar').style.visibility = isElderly ? 'hidden' : 'visible'; document.getElementById('eld-toggle').innerText = isElderly ? "長者模式: 開" : "長者模式: 關"; }
        function updateHint() { const b = document.getElementById('elderly-hint-box'); if(isElderly && state.status === 'play') { b.innerText = i18n[lang].eldHint(state.found, state.targets.length - state.found); b.style.display = 'block'; } else b.style.display = 'none'; }

        loadProfiles();
    </script>
</body>
</html>
