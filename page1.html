<style>
    /* ... (Keep previous root variables) ... */
    
    .grid {
        display: grid;
        gap: 10px;
        margin: 0 auto;
        background: rgba(255,255,255,0.05); /* Slight backing so grid is visible */
        padding: 10px;
        border-radius: 12px;
    }

    .cell {
        aspect-ratio: 1;
        background: #334155; /* The "Dimmed" look was here - now it's solid */
        border: 1px solid #475569;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        color: var(--text); /* Numbers start visible */
    }

    /* When memorizing, pulse the targets */
    .cell.target { 
        background: var(--accent) !important; 
        color: var(--bg) !important;
        animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
        from { transform: scale(1); }
        to { transform: scale(1.05); }
    }

    /* This class ONLY hides the text, not the box */
    .cell.hide-text { 
        color: transparent !important; 
    }

    .cell.correct { 
        background: var(--success) !important; 
        color: var(--bg) !important; 
        transform: scale(1);
    }
    
    .cell.wrong { 
        background: var(--fail) !important; 
    }
</style>

<script>
    // ... (Keep Profile Logic same as before) ...

    function runMemoryPhase() {
        document.getElementById('msg').textContent = "MEMORIZE...";
        
        // Ensure all numbers are visible at start of round
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('hide-text', 'correct', 'wrong');
        });

        setTimeout(() => {
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('target'); // Stop the blue highlight
                c.classList.add('hide-text'); // ONLY hide the number text
            });
            runActionPhase();
        }, 2000);
    }

    function handleInput(el, val) {
        // Prevent clicking during the 2s memory phase
        if (document.getElementById('msg').textContent !== "GO!") return;
        if (el.classList.contains('correct')) return;

        if (state.targets.includes(val)) {
            el.classList.remove('hide-text'); // Make the number reappear
            el.classList.add('correct');
            state.found++;
            state.score += (10 * state.level);
            renderStats();
            if (state.found === state.targetCount) winRound();
        } else {
            el.classList.remove('hide-text');
            el.classList.add('wrong');
            endGame("WRONG CHOICE");
        }
    }
    
    // ... (Keep the rest of the engine the same) ...
</script>
