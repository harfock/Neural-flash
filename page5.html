<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot Blitz | Accessibility</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #4ade80; --fail: #f87171; --text: #f8fafc; --secondary: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Header UI */
        #game-header { width: 100%; padding: 10px; background: var(--card); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--accent); }
        .header-content { max-width: 600px; margin: 0 auto; text-align: center; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 8px; font-weight: bold; }
        #timer-bar { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        /* Grid */
        #game-area { width: 95%; max-width: 500px; padding: 20px 10px; }
        .grid { display: grid; gap: 8px; margin: 0 auto; }
        .grid-5x5 { grid-template-columns: repeat(5, 1fr); }
        .grid-8x5 { grid-template-columns: repeat(5, 1fr); }

        .cell {
            aspect-ratio: 1; background: #334155; border: 1px solid #475569; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s; color: var(--text); user-select: none;
        }
        .cell.target { background: var(--accent) !important; color: var(--bg) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .cell.hide-text { color: transparent !important; }
        .cell.correct { background: var(--success) !important; color: var(--bg) !important; }
        .cell.wrong { background: var(--fail) !important; }
        .cell.hint-flash { animation: hintPulse 0.5s 3; }
        @keyframes hintPulse { 0%, 100% { background: #334155; } 50% { background: #fef08a; } }

        /* Overlay & Buttons */
        .screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 200; text-align: center; overflow-y: auto; }
        .profile-card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; text-align: center; }
        
        .btn-main { background: var(--accent); color: var(--bg); font-weight: bold; padding: 12px; border: none; border-radius: 8px; margin: 5px; cursor: pointer; width: 100%; }
        .btn-elderly { background: #fef08a; color: #854d0e; font-weight: bold; padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; gap: 5px; }
        .elderly-active { border: 2px solid #854d0e; box-shadow: 0 0 10px #fef08a; }
        
        .lang-switch { position: absolute; top: 10px; right: 10px; z-index: 300; }
        .lang-btn { background: var(--secondary); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; font-size: 0.8rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="toggleLang()">EN / 繁中</button>
    </div>

    <div id="game-header" class="hidden">
        <div class="header-content">
            <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
                <h3 id="txt-title" style="margin:0;">SNAPSHOT BLITZ</h3>
                <button id="elderly-toggle" class="btn-elderly" onclick="toggleElderly()">👴 <span id="txt-elderly-btn">Elderly Mode</span></button>
            </div>
            <div class="stats-row">
                <span><span id="txt-lvl">LVL</span>: <span id="cur-lvl">1</span></span>
                <span id="timer-text-container"><span id="txt-time">TIME</span>: <span id="cur-time">5.0</span>s</span>
                <span><span id="txt-score">SCORE</span>: <span id="cur-score">0</span></span>
            </div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="color: var(--accent); margin-bottom: 10px;">SNAPSHOT BLITZ</h1>
        <div class="profile-card">
            <div id="profile-setup">
                <input type="text" id="nick-input" placeholder="Nickname">
                <button class="btn-main" onclick="saveProfile()" id="txt-create">CREATE PROFILE</button>
            </div>
            <div id="profile-display" class="hidden">
                <h2 id="display-name"></h2>
                <button class="btn-main" onclick="initGame(1)" id="txt-play">START GAME</button>
                <button class="btn-main" style="background: var(--secondary);" onclick="deleteProfile()" id="txt-delete">DELETE PROFILE</button>
            </div>
            <div style="text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.8rem;">
                <p id="txt-rules">Rules: Memorize target tiles, then click them after they hide.</p>
            </div>
        </div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <h1 id="txt-fail" style="color: var(--fail);">FAILED</h1>
        <p id="fail-stats"></p>
        <button class="btn-main" onclick="startNextRound()" id="txt-retry">RETRY</button>
        <button class="btn-main" style="background: var(--secondary);" onclick="location.reload()" id="txt-quit">QUIT</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid grid-5x5"></div>
        <div id="msg" style="margin-top: 20px; font-weight: bold; color: var(--accent);">READY?</div>
    </div>

    <script>
        const i18n = {
            en: {
                title: "SNAPSHOT BLITZ", create: "CREATE PROFILE", play: "START GAME", delete: "DELETE PROFILE",
                lvl: "LVL", time: "TIME", score: "SCORE", elderlyBtn: "Elderly Mode",
                rules: "Rules: Memorize targets (2s). Click them in 5s. Wrong clicks or timeout drop you 1 level.",
                fail: "MISSION FAILED", retry: "RETRY LEVEL", quit: "MAIN MENU", ready: "READY?",
                memorize: "MEMORIZE...", go: "GO!", win: "LEVEL CLEAR!"
            },
            big5: {
                title: "閃速記憶", create: "建立個人檔案", play: "開始遊戲", delete: "刪除檔案",
                lvl: "等級", time: "時間", score: "分數", elderlyBtn: "長者模式",
                rules: "規則：記住藍色格 (2秒)，消失後點擊。錯誤或超時會倒退一級。長者模式無時間限制。",
                fail: "挑戰失敗", retry: "重試該關", quit: "返回主頁", ready: "準備？",
                memorize: "記憶中...", go: "開始！", win: "過關！"
            }
        };

        let lang = 'en';
        let user = { name: "Recruit", maxLvl: 1, elderly: false };
        let state = { level: 1, score: 0, found: 0, targets: [], status: 'idle', idleSeconds: 0 };
        let gameTimer, hintTimer;

        function toggleLang() {
            lang = lang === 'en' ? 'big5' : 'en';
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txt-title').textContent = t.title;
            document.getElementById('txt-create').textContent = t.create;
            document.getElementById('txt-play').textContent = t.play;
            document.getElementById('txt-delete').textContent = t.delete;
            document.getElementById('txt-lvl').textContent = t.lvl;
            document.getElementById('txt-time').textContent = t.time;
            document.getElementById('txt-score').textContent = t.score;
            document.getElementById('txt-elderly-btn').textContent = t.elderlyBtn;
            document.getElementById('txt-rules').textContent = t.rules;
            document.getElementById('txt-fail').textContent = t.fail;
            document.getElementById('txt-retry').textContent = t.retry;
            document.getElementById('txt-quit').textContent = t.quit;
        }

        function toggleElderly() {
            user.elderly = !user.elderly;
            document.getElementById('elderly-toggle').classList.toggle('elderly-active', user.elderly);
            document.getElementById('timer-bar').classList.toggle('hidden', user.elderly);
            document.getElementById('timer-text-container').classList.toggle('hidden', user.elderly);
            if (user.elderly) clearInterval(gameTimer);
        }

        function loadProfile() {
            const data = localStorage.getItem('blitz_elderly_v1');
            if (data) {
                user = JSON.parse(data);
                document.getElementById('display-name').textContent = user.name;
                document.getElementById('profile-setup').classList.add('hidden');
                document.getElementById('profile-display').classList.remove('hidden');
                if (user.elderly) document.getElementById('elderly-toggle').classList.add('elderly-active');
            }
            updateUI();
        }

        function saveProfile() {
            const n = document.getElementById('nick-input').value.trim();
            if (!n) return;
            user.name = n;
            localStorage.setItem('blitz_elderly_v1', JSON.stringify(user));
            loadProfile();
        }

        function deleteProfile() {
            localStorage.removeItem('blitz_elderly_v1');
            location.reload();
        }

        function initGame(lvl) {
            state.level = lvl; state.score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            startNextRound();
        }

        function startNextRound() {
            clearInterval(gameTimer);
            clearInterval(hintTimer);
            state.found = 0; state.status = 'memorize'; state.idleSeconds = 0;
            document.getElementById('fail-screen').classList.add('hidden');
            
            let tCount = state.level >= 31 ? 15 : state.level >= 21 ? 12 : state.level >= 11 ? 8 : 5;
            let cells = state.level >= 31 ? 40 : 25;

            renderGrid(cells, tCount);
            document.getElementById('msg').textContent = i18n[lang].memorize;
            document.getElementById('cur-lvl').textContent = state.level;

            setTimeout(() => {
                state.status = 'play';
                document.querySelectorAll('.cell').forEach(c => {
                    c.classList.add('hide-text');
                    c.classList.remove('target');
                });
                if (!user.elderly) startStandardTimer();
                startHintTimer();
            }, 2000);
        }

        function renderGrid(count, tCount) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            container.className = count === 40 ? 'grid grid-8x5' : 'grid grid-5x5';
            const pool = Array.from({length: count}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = pool.slice(0, tCount);

            for (let i = 1; i <= count; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.textContent = i;
                if (state.targets.includes(i)) cell.classList.add('target');
                cell.onclick = () => handleTap(cell, i);
                container.appendChild(cell);
            }
        }

        function startStandardTimer() {
            let timeLeft = 5.0;
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('cur-time').textContent = Math.max(0, timeLeft).toFixed(1);
                document.getElementById('timer-fill').style.width = (timeLeft/5 * 100) + "%";
                if (timeLeft <= 0) endGame("TIMEOUT");
            }, 100);
        }

        function startHintTimer() {
            hintTimer = setInterval(() => {
                state.idleSeconds++;
                if (state.idleSeconds >= 30) {
                    provideHint();
                    state.idleSeconds = 0;
                }
            }, 1000);
        }

        function provideHint() {
            const hiddenTargets = Array.from(document.querySelectorAll('.cell'))
                .filter(c => state.targets.includes(parseInt(c.textContent)) && !c.classList.contains('correct'));
            if (hiddenTargets.length > 0) {
                const hint = hiddenTargets[Math.floor(Math.random() * hiddenTargets.length)];
                hint.classList.add('hint-flash');
                setTimeout(() => hint.classList.remove('hint-flash'), 1500);
            }
        }

        function handleTap(el, val) {
            if (state.status !== 'play' || el.classList.contains('correct')) return;
            state.idleSeconds = 0; // Reset hint timer on click

            if (state.targets.includes(val)) {
                el.classList.remove('hide-text', 'hint-flash');
                el.classList.add('correct');
                state.found++;
                state.score += 10;
                document.getElementById('cur-score').textContent = state.score;
                if (state.found === state.targets.length) winRound();
            } else {
                el.classList.add('wrong');
                endGame("WRONG");
            }
        }

        function winRound() {
            clearInterval(gameTimer); clearInterval(hintTimer);
            state.status = 'idle';
            state.level++;
            document.getElementById('msg').textContent = i18n[lang].win;
            setTimeout(startNextRound, 800);
        }

        function endGame(reason) {
            clearInterval(gameTimer); clearInterval(hintTimer);
            state.status = 'idle';
            if (!user.elderly && state.level > 1) state.level--; // Drop back 1 level if not in Elderly mode
            
            document.getElementById('fail-screen').classList.remove('hidden');
            document.getElementById('fail-stats').textContent = reason;
        }

        loadProfile();
    </script>
</body>
</html>
