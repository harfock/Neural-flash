<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot Blitz | Professional Edition</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(30, 30, 30, 0.95);
            --accent: #00eaff;
            --success: #00ff41;
            --fail: #ff003c;
            --text: #ffffff;
            --gold: #ffff00;
            --base-font: 1.25rem;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; transition: 0.2s; }
        body {
            background: radial-gradient(circle at top, #1a1a1a, #000000);
            color: var(--text); margin: 0; font-size: var(--base-font);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #elderly-hint-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 18px 25px;
            border-radius: 50px; font-weight: 900; font-size: 1.3rem;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.5); z-index: 500;
            text-align: center; border: 4px solid #000; display: none;
            animation: float 2.5s infinite ease-in-out; width: 90%; max-width: 450px;
        }
        @keyframes float { 0%, 100% { bottom: 30px; } 50% { bottom: 45px; } }

        .glass-card {
            background: var(--glass); border: 3px solid var(--text);
            border-radius: 24px; padding: 30px; width: 95%; max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 234, 255, 0.1); margin-top: 20px;
        }

        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .btn-hc {
            background: var(--text); color: var(--bg); border: none;
            padding: 10px 18px; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 1rem;
        }

        .btn-primary {
            width: 100%; padding: 20px; background: var(--success); color: #000;
            font-weight: 900; font-size: 1.5rem; border: none; border-radius: 15px;
            cursor: pointer; margin-top: 15px; text-transform: uppercase;
        }

        /* Profile Management UI */
        .profile-item {
            background: #111; border: 2px solid var(--text); padding: 12px;
            margin-bottom: 10px; border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .profile-info { flex-grow: 1; cursor: pointer; padding: 5px; }
        .profile-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 8px; font-size: 0.8rem; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-edit { background: var(--accent); color: #000; }
        .btn-del { background: var(--fail); color: #fff; }

        /* Game Elements */
        #game-header { width: 100%; padding: 15px; background: #000; border-bottom: 5px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-weight: 900; }
        #timer-bar { width: 100%; height: 14px; background: #333; margin-top: 15px; border: 2px solid var(--text); border-radius: 10px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); }
        .grid { display: grid; gap: 10px; margin: 0 auto; width: 100%; }
        .cell {
            aspect-ratio: 1; background: #111; border: 3px solid #444; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; cursor: pointer; color: var(--text);
        }
        .cell.target { background: var(--accent) !important; color: #000 !important; border-color: #fff; }
        .cell.correct { background: var(--success) !important; color: #000 !important; }
        .cell.wrong { background: var(--fail) !important; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: var(--bg); padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="elderly-hint-box"></div>

    <div class="top-bar">
        <span style="color: var(--accent); font-weight:900; letter-spacing:2px; font-size:1rem;">SNAPSHOT BLITZ</span>
        <button id="btn-logout" class="btn-hc hidden" onclick="location.reload()">👤 SWITCH USER</button>
    </div>

    <div id="game-header" class="hidden">
        <div style="text-align: center; margin-bottom: 10px;">
            <button id="eld-toggle" class="btn-hc" style="background:var(--gold);" onclick="toggleElderly()">長者模式: 關</button>
        </div>
        <div class="stats-grid">
            <div><span id="txt-lvl">等級</span><br><span id="cur-lvl">1</span></div>
            <div id="timer-ui"><span id="txt-time">時間</span><br><span id="cur-time">5.0</span>s</div>
            <div><span id="txt-score">分數</span><br><span id="cur-score">0</span></div>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 id="main-title" style="color: var(--accent); letter-spacing: 4px;">快照閃電戰</h1>
        <div class="glass-card">
            <button id="start-lang-btn" class="btn-hc" style="width:100%; margin-bottom:15px; background:var(--accent); color:#000;" onclick="toggleLang()">🌐 切換語言 / Switch Language</button>

            <div id="profile-select-view">
                <h3 id="txt-select-head" style="margin-top:0;">選擇使用者</h3>
                <div id="profile-list"></div>
                <button class="btn-primary" onclick="showCreateView()" id="txt-new-btn">+ 新建檔案</button>
            </div>

            <div id="profile-dash-view" class="hidden">
                <h2 id="dash-name" style="margin-top:0; color: var(--accent);"></h2>
                <button class="btn-primary" onclick="startAt(state.level)" id="txt-resume-btn">繼續挑戰</button>
                <button class="btn-primary" style="background: var(--accent);" onclick="startAt(1)" id="txt-start-btn">第一關開始</button>
            </div>

            <div id="profile-create-view" class="hidden">
                <input type="text" id="in-name" placeholder="輸入名稱" style="width:100%; padding:15px; border-radius:10px; border:3px solid var(--text); background:#000; color:#fff; font-size:1.4rem; margin-bottom:15px;">
                <button class="btn-primary" onclick="saveProfile()" id="txt-save-btn">儲存 / SAVE</button>
                <button class="btn-hc" style="width:100%; margin-top:10px;" onclick="cancelCreate()">取消 / CANCEL</button>
            </div>

            <div id="rules-box" style="margin-top: 20px; font-size: 0.9rem; color: #ccc; border-top: 2px solid #444; padding-top: 15px;">
                <strong style="color: var(--gold);" id="txt-rule-head">遊戲詳細規則：</strong>
                <ul id="rule-list" style="padding-left: 20px; margin-top: 10px;"></ul>
            </div>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid"></div>
        <div id="msg" style="text-align: center; margin-top: 25px; font-weight: 900; font-size: 2.2rem; color: var(--accent);"></div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <div class="glass-card" style="border-color: var(--fail); text-align:center;">
            <h1 id="fail-title" style="color: var(--fail);">失敗</h1>
            <button class="btn-primary" onclick="runRound()" id="txt-retry-btn">重試</button>
            <button class="btn-hc" style="width:100%; margin-top:20px;" onclick="location.reload()" id="txt-quit-btn">離開</button>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                mainTitle: "SNAPSHOT BLITZ", select: "SELECT PROFILE", new: "+ NEW PROFILE", resume: "RESUME MISSION", start: "START LVL 1", lvl: "LVL", time: "TIME", score: "SCORE",
                ruleHead: "GAME MECHANICS:", rules: ["Memory: Locations flash briefly. Remember them!", "Blitz: Click correct tiles within 5 seconds.", "Progression: Grid grows every 10 levels.", "Visible: Numbers stay visible to help you."],
                eldOn: "Elderly Mode: ON", eldOff: "Elderly Mode: OFF", eldHint: (x, y) => `Good! Found ${x}, need ${y} more!`,
                mem: (n) => `MEMORIZE... (${n}s)`, go: "GO!", clear: "CLEAR!", switchUser: "👤 SWITCH USER",
                delConfirm: "Are you sure you want to delete this profile?", editPrompt: "Enter new name:"
            },
            big5: {
                mainTitle: "快照閃電戰", select: "選擇使用者", new: "+ 新建檔案", resume: "繼續挑戰", start: "第一關開始", lvl: "等級", time: "時間", score: "分數",
                ruleHead: "遊戲詳細規則：", rules: ["記憶：目標方格會閃爍，請記住位置。", "點擊：必須在 5秒內完成點選。", "進度：每過10關，網格會擴大。", "提示：數字全程顯示，方便辨識。"],
                eldOn: "長者模式: 開", eldOff: "長者模式: 關", eldHint: (x, y) => `很棒！已選中 ${x} 個，還剩 ${y} 個！`,
                mem: (n) => `記憶中... (${n}秒)`, go: "開始！", clear: "過關！", switchUser: "👤 切換使用者",
                delConfirm: "確定要刪除此檔案嗎？", editPrompt: "輸入新名稱："
            }
        };

        let lang = 'big5';
        let profiles = [];
        let curIdx = -1;
        let editingIdx = -1;
        let isElderly = false;
        let state = { level: 1, score: 0, targets: [], found: 0, status: 'idle' };
        let gameTimer;

        function toggleLang() { lang = (lang === 'en') ? 'big5' : 'en'; renderUI(); loadProfiles(); }

        function renderUI() {
            const t = i18n[lang];
            document.getElementById('main-title').innerText = t.mainTitle;
            document.getElementById('txt-select-head').innerText = t.select;
            document.getElementById('txt-new-btn').innerText = t.new;
            document.getElementById('txt-resume-btn').innerText = t.resume;
            document.getElementById('txt-start-btn').innerText = t.start;
            document.getElementById('txt-lvl').innerText = t.lvl;
            document.getElementById('txt-time').innerText = t.time;
            document.getElementById('txt-score').innerText = t.score;
            document.getElementById('txt-rule-head').innerText = t.ruleHead;
            document.getElementById('rule-list').innerHTML = t.rules.map(r => `<li>${r}</li>`).join('');
            document.getElementById('btn-logout').innerText = t.switchUser;
            document.getElementById('eld-toggle').innerText = isElderly ? t.eldOn : t.eldOff;
        }

        function loadProfiles() {
            const saved = localStorage.getItem('blitz_v_final');
            profiles = saved ? JSON.parse(saved) : [];
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            profiles.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'profile-item';
                item.innerHTML = `
                    <div class="profile-info" onclick="selectProfile(${i})">
                        <strong>${p.name}</strong> <small>(LVL ${p.maxLvl})</small>
                    </div>
                    <div class="profile-actions">
                        <button class="btn-sm btn-edit" onclick="editProfile(${i})">✎</button>
                        <button class="btn-sm btn-del" onclick="deleteProfile(${i})">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
            renderUI();
        }

        function showCreateView() {
            editingIdx = -1;
            document.getElementById('in-name').value = '';
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-create-view').classList.remove('hidden');
        }

        function cancelCreate() {
            document.getElementById('profile-create-view').classList.add('hidden');
            document.getElementById('profile-select-view').classList.remove('hidden');
        }

        function saveProfile() {
            const n = document.getElementById('in-name').value.trim();
            if (!n) return;
            if (editingIdx > -1) {
                profiles[editingIdx].name = n;
            } else {
                profiles.push({ name: n, maxLvl: 1 });
            }
            localStorage.setItem('blitz_v_final', JSON.stringify(profiles));
            loadProfiles();
            cancelCreate();
        }

        function editProfile(i) {
            editingIdx = i;
            document.getElementById('in-name').value = profiles[i].name;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-create-view').classList.remove('hidden');
        }

        function deleteProfile(i) {
            if (confirm(i18n[lang].delConfirm)) {
                profiles.splice(i, 1);
                localStorage.setItem('blitz_v_final', JSON.stringify(profiles));
                loadProfiles();
            }
        }

        function selectProfile(i) {
            curIdx = i;
            state.level = profiles[i].maxLvl;
            document.getElementById('dash-name').innerText = profiles[i].name;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-dash-view').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
        }

        function startAt(lvl) {
            state.level = lvl;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            runRound();
        }

        function runRound() {
            clearInterval(gameTimer);
            state.found = 0; state.status = 'mem'; updateHint();
            document.getElementById('fail-screen').classList.add('hidden');

            const tier = Math.floor((state.level - 1) / 10);
            const gridCells = Math.min(100, 25 + (tier * 15));
            const density = Math.min(0.40, 0.20 + (((state.level - 1) % 10) * 0.02));
            const tCount = Math.floor(gridCells * density);
            const memTime = tCount;

            initGrid(gridCells, tCount);
            document.getElementById('msg').innerText = i18n[lang].mem(memTime);
            document.getElementById('cur-lvl').innerText = state.level;

            let remaining = memTime;
            const memInterval = setInterval(() => {
                remaining--;
                if (remaining > 0) document.getElementById('msg').innerText = i18n[lang].mem(remaining);
            }, 1000);

            setTimeout(() => {
                clearInterval(memInterval);
                state.status = 'play'; updateHint();
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('target'));
                document.getElementById('msg').innerText = i18n[lang].go;
                if (!isElderly) startCountdown();
            }, memTime * 1000);
        }

        function initGrid(count, tCount) {
            const g = document.getElementById('grid-container');
            g.innerHTML = '';
            const cols = Math.ceil(Math.sqrt(count));
            g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            const p = Array.from({ length: count }, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = p.slice(0, tCount);
            for (let i = 1; i <= count; i++) {
                const c = document.createElement('div');
                c.className = 'cell'; c.innerText = i;
                if (state.targets.includes(i)) c.classList.add('target');
                c.onclick = () => {
                    if (state.status !== 'play' || c.classList.contains('correct')) return;
                    if (state.targets.includes(i)) {
                        c.classList.add('correct');
                        state.found++; updateHint();
                        if (state.found === state.targets.length) win();
                    } else { c.classList.add('wrong'); if (!isElderly) fail(); }
                };
                g.appendChild(c);
            }
        }

        function startCountdown() {
            let s = 5.0;
            gameTimer = setInterval(() => {
                s -= 0.1;
                document.getElementById('cur-time').innerText = Math.max(0, s).toFixed(1);
                document.getElementById('timer-fill').style.width = (s / 5 * 100) + "%";
                if (s <= 0) fail();
            }, 100);
        }

        function toggleElderly() {
            isElderly = !isElderly;
            document.getElementById('eld-toggle').innerText = isElderly ? i18n[lang].eldOn : i18n[lang].eldOff;
            document.getElementById('timer-bar').style.visibility = isElderly ? 'hidden' : 'visible';
            document.getElementById('timer-ui').style.visibility = isElderly ? 'hidden' : 'visible';
            updateHint();
        }

        function updateHint() {
            const box = document.getElementById('elderly-hint-box');
            if (isElderly && state.status === 'play') {
                box.innerText = i18n[lang].eldHint(state.found, state.targets.length - state.found);
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function win() {
            clearInterval(gameTimer); state.status = 'idle'; updateHint();
            document.getElementById('msg').innerText = i18n[lang].clear;
            state.level++; save();
            setTimeout(runRound, 1000);
        }

        function save() { if (curIdx !== -1 && state.level > profiles[curIdx].maxLvl) { profiles[curIdx].maxLvl = state.level; localStorage.setItem('blitz_v_final', JSON.stringify(profiles)); } }
        function fail() { clearInterval(gameTimer); state.status = 'idle'; updateHint(); document.getElementById('fail-screen').classList.remove('hidden'); }

        loadProfiles();
    </script>
</body>
</html>
