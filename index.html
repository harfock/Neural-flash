<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Quiver | Grid Memory</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #4ade80;
            --fail: #f87171;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #timer-bar {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #timer-fill {
            width: 100%;
            height: 100%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: var(--card);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            user-select: none;
            transition: transform 0.1s, background 0.2s;
        }

        .cell:active { transform: scale(0.9); }
        
        .cell.target { background: var(--accent); color: var(--bg); }
        .cell.hidden { color: transparent; }
        .cell.correct { background: var(--success) !important; color: var(--bg) !important; }
        .cell.wrong { background: var(--fail) !important; }

        .menu {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .hidden-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats-bar">
            <span>Level: <span id="lvl">1</span></span>
            <span>Score: <span id="score">0</span></span>
        </div>
        
        <div id="timer-bar"><div id="timer-fill"></div></div>

        <div class="grid" id="grid"></div>
        <p id="instruction">Memorize the blue tiles!</p>
    </div>

    <div id="overlay" class="menu">
        <h1 id="title">QUANTUM QUIVER</h1>
        <p id="final-stats"></p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <script>
        const gridEl = document.getElementById('grid');
        const timerFill = document.getElementById('timer-fill');
        const scoreEl = document.getElementById('score');
        const lvlEl = document.getElementById('lvl');
        const overlay = document.getElementById('overlay');
        const instruction = document.getElementById('instruction');

        let score = 0;
        let level = 1;
        let targets = [];
        let found = 0;
        let gameActive = false;
        let timerInterval;

        // Initialize Grid
        function createGrid() {
            gridEl.innerHTML = '';
            for (let i = 1; i <= 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.val = i;
                cell.textContent = i;
                cell.onclick = () => handleSelect(cell);
                gridEl.appendChild(cell);
            }
        }

        function startGame() {
            score = 0;
            level = 1;
            scoreEl.textContent = score;
            lvlEl.textContent = level;
            overlay.classList.add('hidden-ui');
            nextRound();
        }

        function nextRound() {
            found = 0;
            gameActive = false;
            createGrid();
            
            // Randomly pick 5 targets
            const nums = Array.from({length: 25}, (_, i) => i + 1);
            targets = nums.sort(() => 0.5 - Math.random()).slice(0, 5);
            
            // Highlight targets
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                if (targets.includes(parseInt(cell.dataset.val))) {
                    cell.classList.add('target');
                }
            });

            instruction.textContent = "Memorize...";
            
            // Phase 1: Memorization (2 seconds)
            setTimeout(() => {
                cells.forEach(cell => {
                    cell.classList.remove('target');
                    cell.classList.add('hidden');
                });
                startCountdown();
            }, 2000);
        }

        function startCountdown() {
            gameActive = true;
            instruction.textContent = "Find them!";
            let timeLeft = 5000;
            const start = Date.now();

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - start;
                timeLeft = 5000 - elapsed;
                const percent = (timeLeft / 5000) * 100;
                timerFill.style.width = percent + "%";

                if (timeLeft <= 0) {
                    gameOver("TIME OUT!");
                }
            }, 50);
        }

        function handleSelect(cell) {
            if (!gameActive || cell.classList.contains('correct')) return;

            const val = parseInt(cell.dataset.val);
            cell.classList.remove('hidden');

            if (targets.includes(val)) {
                cell.classList.add('correct');
                found++;
                score += 10 * level;
                scoreEl.textContent = score;

                if (found === 5) {
                    winRound();
                }
            } else {
                cell.classList.add('wrong');
                gameOver("WRONG TILE!");
            }
        }

        function winRound() {
            clearInterval(timerInterval);
            gameActive = false;
            level++;
            lvlEl.textContent = level;
            setTimeout(nextRound, 1000);
        }

        function gameOver(reason) {
            clearInterval(timerInterval);
            gameActive = false;
            overlay.classList.remove('hidden-ui');
            document.getElementById('title').textContent = reason;
            document.getElementById('final-stats').textContent = `Final Score: ${score} | Level: ${level}`;
            
            // Local Storage High Score
            const highscore = localStorage.getItem('qq_highscore') || 0;
            if (score > highscore) {
                localStorage.setItem('qq_highscore', score);
                document.getElementById('final-stats').textContent += " (New High Score!)";
            }
        }

        createGrid();
    </script>
</body>
</html>
