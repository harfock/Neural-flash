<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot Blitz | Elderly Support</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #1a1a1a;
            --accent: #00eaff; 
            --success: #00ff41; 
            --fail: #ff003c; 
            --text: #ffffff;
            --gold: #ffff00;
            --base-font: 1.25rem;
        }

        * { box-sizing: border-box; font-family: Arial, sans-serif; transition: all 0.2s ease; }
        
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-size: var(--base-font);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* 浮動提示框樣式 (Elderly Floating Hint) */
        #elderly-hint-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
            z-index: 500;
            text-align: center;
            border: 3px solid #000;
            display: none; /* 預設隱藏 */
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { bottom: 30px; }
            50% { bottom: 45px; }
        }

        .high-contrast-panel {
            background: var(--panel); border: 3px solid var(--text);
            border-radius: 12px; padding: 25px; width: 100%; max-width: 500px;
        }

        .btn-hc { 
            background: var(--text); color: var(--bg); border: none; 
            padding: 10px 15px; font-weight: 900; cursor: pointer; border-radius: 4px;
        }

        #game-header { width: 100%; padding: 10px; background: #111; border-bottom: 4px solid var(--accent); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-weight: 900; }
        #timer-bar { width: 100%; height: 15px; background: #333; margin-top: 10px; border: 1px solid var(--text); }
        #timer-fill { width: 100%; height: 100%; background: var(--accent); }

        #game-area { width: 95%; max-width: 600px; padding: 15px 0; padding-bottom: 120px; }
        .grid { display: grid; gap: 10px; margin: 0 auto; }
        
        .cell {
            aspect-ratio: 1; background: #222; border: 3px solid #444; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; cursor: pointer; color: var(--text);
        }
        .cell.target { background: var(--accent) !important; color: #000 !important; }
        .cell.hide-text { color: transparent !important; }
        .cell.correct { background: var(--success) !important; color: #000 !important; border-color: #fff; }
        .cell.wrong { background: var(--fail) !important; }
        .cell.hint-flash { animation: hc-flash 0.6s infinite; }
        @keyframes hc-flash { 0%, 100% { background: #222; } 50% { background: var(--gold); color: #000; } }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 200; background: var(--bg); }
        .hidden { display: none !important; }

        .btn-primary { 
            width: 100%; padding: 20px; background: var(--success); color: #000; 
            font-weight: 900; font-size: 1.5rem; border: none; cursor: pointer; margin-top: 10px;
        }

        .elderly-toggle-btn {
            background: var(--gold); color: #000; padding: 8px 15px; border-radius: 20px;
            font-weight: 900; font-size: 0.9rem; cursor: pointer; border: 2px solid #000;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="elderly-hint-box"></div>

    <div class="top-bar">
        <button class="btn-hc" onclick="toggleLang()">EN / 繁中</button>
        <button id="btn-logout" class="btn-hc hidden" onclick="location.reload()">SWITCH USER</button>
    </div>

    <div id="game-header" class="hidden">
        <div style="text-align: center;">
            <button id="eld-mode-toggle" class="elderly-toggle-btn" onclick="toggleElderly()">長者模式: 關</button>
        </div>
        <div class="stats-grid">
            <div><span id="txt-lvl">LVL</span><br><span id="cur-lvl">1</span></div>
            <div id="timer-ui"><span id="txt-time">TIME</span><br><span id="cur-time">5.0</span>s</div>
            <div><span id="txt-score">SCORE</span><br><span id="cur-score">0</span></div>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>SNAPSHOT BLITZ</h1>
        <div class="high-contrast-panel">
            <div id="profile-select-view">
                <h3 id="txt-select-head">SELECT PROFILE</h3>
                <div id="profile-list"></div>
                <button class="btn-primary" onclick="showCreateView()" id="txt-new-btn">+ NEW PROFILE</button>
            </div>
            <div id="profile-dash-view" class="hidden">
                <h2 id="dash-name"></h2>
                <button class="btn-primary" onclick="startAt(state.level)" id="txt-resume-btn">RESUME</button>
                <button class="btn-primary" style="background: var(--accent);" onclick="startAt(1)" id="txt-start-btn">START LVL 1</button>
            </div>
            <div id="profile-create-view" class="hidden">
                <input type="text" id="in-name" placeholder="NAME">
                <button class="btn-primary" onclick="createProfile()">CREATE</button>
            </div>
        </div>
    </div>

    <div id="tier-screen" class="screen hidden">
        <div class="high-contrast-panel">
            <h1 id="txt-tier-up" style="color: var(--gold);">TIER CLEARED!</h1>
            <div id="tier-report" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
            <button class="btn-primary" onclick="closeTierGate()">CONTINUE</button>
        </div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <div class="high-contrast-panel">
            <h1 id="txt-fail-head" style="color: var(--fail);">FAILED</h1>
            <button class="btn-primary" onclick="runRound()">RETRY</button>
            <button class="btn-hc" style="width:100%; margin-top:15px;" onclick="location.reload()">QUIT</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="grid-container" class="grid"></div>
        <div id="msg" style="text-align: center; margin-top: 20px; font-weight: 900; font-size: 2rem; color: var(--accent);"></div>
    </div>

    <script>
        const i18n = {
            en: {
                eldOn: "Elderly Mode: ON", eldOff: "Elderly Mode: OFF",
                eldHint: (x, y) => `Great job! You've picked ${x}, only ${y} more to go!`,
                mem: "MEMORIZE...", go: "GO!", clear: "CLEAR!"
            },
            big5: {
                eldOn: "長者模式: 開", eldOff: "長者模式: 關",
                eldHint: (x, y) => `你很厲害，已經選中了 ${x} 個字，再選 ${y} 個字，就可以過關了！`,
                mem: "記憶中...", go: "開始！", clear: "過關！"
            }
        };

        let lang = 'big5';
        let profiles = [];
        let curIdx = -1;
        let isElderly = false;
        let state = { level: 1, score: 0, targets: [], found: 0, status: 'idle' };
        let gameTimer;

        function toggleLang() { lang = (lang === 'en') ? 'big5' : 'en'; loadProfiles(); }

        function toggleElderly() {
            isElderly = !isElderly;
            const btn = document.getElementById('eld-mode-toggle');
            btn.innerText = isElderly ? i18n[lang].eldOn : i18n[lang].eldOff;
            document.getElementById('timer-bar').style.visibility = isElderly ? 'hidden' : 'visible';
            document.getElementById('timer-ui').style.visibility = isElderly ? 'hidden' : 'visible';
            updateElderlyHint();
        }

        // 更新長者模式浮動提示
        function updateElderlyHint() {
            const hintBox = document.getElementById('elderly-hint-box');
            if (isElderly && state.status === 'play') {
                const remaining = state.targets.length - state.found;
                hintBox.innerHTML = i18n[lang].eldHint(state.found, remaining);
                hintBox.style.display = 'block';
            } else {
                hintBox.style.display = 'none';
            }
        }

        function loadProfiles() {
            const saved = localStorage.getItem('blitz_hc_v1');
            profiles = saved ? JSON.parse(saved) : [];
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            profiles.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'profile-item';
                d.style.cssText = "background:#111; border:2px solid #fff; padding:15px; margin-bottom:10px; display:flex; justify-content:space-between;";
                d.innerHTML = `<strong>${p.name}</strong> <span>LVL ${p.maxLvl} ▶</span>`;
                d.onclick = () => selectProfile(i);
                list.appendChild(d);
            });
        }

        function selectProfile(i) {
            curIdx = i;
            state.level = profiles[i].maxLvl;
            document.getElementById('dash-name').innerText = profiles[i].name;
            document.getElementById('profile-select-view').classList.add('hidden');
            document.getElementById('profile-dash-view').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
        }

        function showCreateView() { 
            document.getElementById('profile-select-view').classList.add('hidden'); 
            document.getElementById('profile-create-view').classList.remove('hidden'); 
        }

        function createProfile() {
            const n = document.getElementById('in-name').value.trim();
            if(!n) return;
            profiles.push({ name: n, maxLvl: 1, topScore: 0 });
            localStorage.setItem('blitz_hc_v1', JSON.stringify(profiles));
            location.reload();
        }

        function startAt(lvl) {
            state.level = lvl;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            runRound();
        }

        function runRound() {
            clearInterval(gameTimer);
            state.found = 0; state.status = 'mem';
            updateElderlyHint();
            document.getElementById('fail-screen').classList.add('hidden');
            
            const tier = Math.floor((state.level - 1) / 10);
            const gridCells = Math.min(100, 25 + (tier * 15));
            const levelInTier = (state.level - 1) % 10;
            const density = Math.min(0.40, 0.20 + (levelInTier * 0.02));
            const tCount = Math.floor(gridCells * density);

            initGrid(gridCells, tCount);
            document.getElementById('msg').innerText = i18n[lang].mem;
            document.getElementById('cur-lvl').innerText = state.level;

            setTimeout(() => {
                state.status = 'play';
                document.querySelectorAll('.cell').forEach(c => { c.classList.add('hide-text'); c.classList.remove('target'); });
                document.getElementById('msg').innerText = i18n[lang].go;
                updateElderlyHint();
                if (!isElderly) startTimer();
            }, 2000);
        }

        function initGrid(count, tCount) {
            const g = document.getElementById('grid-container');
            g.innerHTML = '';
            const cols = Math.ceil(Math.sqrt(count));
            g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            const p = Array.from({length: count}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
            state.targets = p.slice(0, tCount);
            for(let i=1; i<=count; i++) {
                const c = document.createElement('div');
                c.className = 'cell'; c.innerText = i;
                if(state.targets.includes(i)) c.classList.add('target');
                c.onclick = () => onCellTap(c, i);
                g.appendChild(c);
            }
        }

        function onCellTap(el, v) {
            if(state.status !== 'play' || el.classList.contains('correct')) return;
            if(state.targets.includes(v)) {
                el.classList.remove('hide-text');
                el.classList.add('correct');
                state.found++;
                state.score += 10;
                document.getElementById('cur-score').innerText = state.score;
                updateElderlyHint(); // 每次點對都更新提示
                if(state.found === state.targets.length) checkWin();
            } else {
                el.classList.add('wrong');
                if (!isElderly) fail();
            }
        }

        function startTimer() {
            let s = 5.0;
            gameTimer = setInterval(() => {
                s -= 0.1;
                document.getElementById('cur-time').innerText = Math.max(0, s).toFixed(1);
                document.getElementById('timer-fill').style.width = (s/5 * 100) + "%";
                if(s <= 0) fail();
            }, 100);
        }

        function checkWin() {
            clearInterval(gameTimer);
            state.status = 'idle';
            updateElderlyHint();
            document.getElementById('msg').innerText = i18n[lang].clear;
            if (state.level % 10 === 0) {
                showTierGate();
            } else {
                state.level++;
                updateProgress();
                setTimeout(runRound, 800);
            }
        }

        function showTierGate() {
            document.getElementById('tier-screen').classList.remove('hidden');
        }

        function closeTierGate() {
            state.level++;
            updateProgress();
            document.getElementById('tier-screen').classList.add('hidden');
            runRound();
        }

        function updateProgress() {
            if(state.level > profiles[curIdx].maxLvl) {
                profiles[curIdx].maxLvl = state.level;
                localStorage.setItem('blitz_hc_v1', JSON.stringify(profiles));
            }
        }

        function fail() {
            clearInterval(gameTimer);
            state.status = 'idle';
            updateElderlyHint();
            document.getElementById('fail-screen').classList.remove('hidden');
        }

        loadProfiles();
    </script>
</body>
</html>
